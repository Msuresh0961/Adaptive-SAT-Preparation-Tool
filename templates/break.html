<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis — Break</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card" style="text-align:center;">
            <div class="brand">
                <span class="brand-dot"></span>
                <span class="brand-name">Gnosis</span>
            </div>

            <h1 class="home-title" style="margin-top:1rem;">Break Time</h1>
            <p class="home-sub">You've completed the Reading and Writing section. Take a breather before Math.</p>

            <!-- Break countdown display -->
            <div class="break-timer" id="breakDisplay">10:00</div>
            <p class="question-label" style="margin-bottom:1.5rem;">remaining</p>

            <!-- Progress so far -->
            <div class="score-pill" style="margin-bottom:1.5rem;">
                RW Score so far: <strong>{{ rw_score }} / {{ rw_total }}</strong>
            </div>

            <a href="{{ url_for("break_done") }}"
               style="display:block; text-decoration:none; text-align:center;">
                Skip Break &rarr;
            </a>
        </div>
    </div>

    <script>
        // 10 minute countdown — auto redirects when done
        let seconds = 600;
        const display = document.getElementById('breakDisplay');

        function tick() {
            if (seconds <= 0) {
                window.location.href = "{{ url_for("break_done") }}"
                return;
            }
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            display.textContent = m + ':' + String(s).padStart(2, '0');
            seconds--;
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
