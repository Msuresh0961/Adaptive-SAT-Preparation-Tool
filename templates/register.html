<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card">
            <div class="brand">
                <span class="brand-dot"></span>
                <span class="brand-name">Gnosis</span>
            </div>
            <h1 class="home-title">Create account.</h1>
            <p class="home-sub">Pick a username and password to get started.</p>

            <!-- Error message if registration fails -->
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="post" class="name-form">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username"
                           required autocomplete="username" autofocus
                           minlength="2" maxlength="30" />
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password (min 4 characters)"
                           required autocomplete="new-password" minlength="4" />
                </div>
                <div class="input-group">
                    <input type="password" name="confirm" placeholder="Confirm password"
                           required autocomplete="new-password" />
                </div>
                <button type="submit" class="btn-primary">Create Account &rarr;</button>
            </form>

            <div class="home-links">
                <span style="font-size:0.875rem; color:var(--text-muted);">Already have an account?</span>
                <a href="{{ url_for('login') }}" class="home-link">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
