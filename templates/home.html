<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive-SAT-Preparation-Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card">
            <div class="brand">
                <span class="brand-dot"></span>
                <span class="brand-name">Adaptive-SAT-Preparation-Tool</span>
            </div>

            <div class="welcome-row">
                <p class="home-sub" style="margin:0;">Hey, <strong>{{ username }}</strong>!</p>
                <a href="{{ url_for('logout') }}" class="logout-btn">Log out</a>
            </div>

            <h1 class="home-title" style="margin-top:1rem;">Test your knowledge.<br>Beat the clock.</h1>

            <!-- ── Quick Quiz ── -->
            <form method="post" class="name-form" style="margin-bottom:0.5rem;">
                <input type="hidden" name="mode" value="quick" />
                <button type="submit" class="mode-card-btn">
                    <span class="mode-card-title">⚡ Quick Quiz</span>
                    <span class="mode-card-desc">20 random questions · 10 sec each · Leaderboard</span>
                </button>
            </form>

            <!-- ── SAT Practice ── -->
            <form method="post" class="name-form" style="margin-bottom:0.5rem;">
                <input type="hidden" name="mode" value="sat" />
                <button type="submit" class="mode-card-btn">
                    <span class="mode-card-title">📝 SAT Practice</span>
                    <span class="mode-card-desc">20 questions · No timer · Leaderboard</span>
                </button>
            </form>

            <!-- ── Full Test (expandable) ── -->
            <div class="mode-card-expand">
                <button type="button" class="mode-card-btn" onclick="toggleFullTest()">
                    <span class="mode-card-title">📋 Full SAT Test</span>
                    <span class="mode-card-desc">4 modules · Timed · Adaptive difficulty</span>
                    <span class="expand-arrow" id="fullTestArrow">▾</span>
                </button>
                <div class="full-test-options" id="fullTestOptions" style="display:none;">
                    <form method="post">
                        <input type="hidden" name="mode" value="full_test" />
                        <input type="hidden" name="test_number" value="1" />
                        <button type="submit" class="full-test-btn">
                            <span class="full-test-title">Practice Test 1</span>
                            <span class="full-test-meta">108 questions · RW → Math · Adaptive</span>
                        </button>
                    </form>
                    <form method="post">
                        <input type="hidden" name="mode" value="full_test" />
                        <input type="hidden" name="test_number" value="2" />
                        <button type="submit" class="full-test-btn">
                            <span class="full-test-title">Practice Test 2</span>
                            <span class="full-test-meta">108 questions · RW → Math · Adaptive</span>
                        </button>
                    </form>
                    <form method="post">
                        <input type="hidden" name="mode" value="full_test" />
                        <input type="hidden" name="test_number" value="3" />
                        <button type="submit" class="full-test-btn">
                            <span class="full-test-title">Practice Test 3</span>
                            <span class="full-test-meta">108 questions · RW → Math · Adaptive</span>
                        </button>
                    </form>
                    <form method="post">
                        <input type="hidden" name="mode" value="full_test" />
                        <input type="hidden" name="test_number" value="4" />
                        <button type="submit" class="full-test-btn">
                            <span class="full-test-title">Practice Test 4</span>
                            <span class="full-test-meta">108 questions · RW → Math · Adaptive</span>
                        </button>
                    </form>
                    <form method="post">
                        <input type="hidden" name="mode" value="full_test" />
                        <input type="hidden" name="test_number" value="5" />
                        <button type="submit" class="full-test-btn">
                            <span class="full-test-title">Practice Test 5</span>
                            <span class="full-test-meta">108 questions · RW → Math · Adaptive</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- ── Focus Practice ── -->
            <a href="{{ url_for('focus_select') }}" class="mode-card-btn" style="display:block; text-decoration:none; margin-top:0.5rem;">
                <span class="mode-card-title">🎯 Focus Practice</span>
                <span class="mode-card-desc">Pick a topic and difficulty · 10 questions</span>
            </a>

            <!-- Quick links -->
            <div class="home-links">
                <a href="{{ url_for('leaderboard') }}" class="home-link">🏆 Leaderboard</a>
                <a href="{{ url_for('stats', username=username) }}" class="home-link">📊 My Stats</a>
            </div>
        </div>

        <div class="home-deco">
            <div class="deco-pill">Geography</div>
            <div class="deco-pill">Science</div>
            <div class="deco-pill">Math</div>
            <div class="deco-pill">History</div>
            <div class="deco-pill">SAT Reading</div>
            <div class="deco-pill">SAT Math</div>
        </div>
    </div>

    <script>
        function toggleFullTest() {
            const opts  = document.getElementById('fullTestOptions');
            const arrow = document.getElementById('fullTestArrow');
            const open  = opts.style.display === 'none';
            opts.style.display  = open ? 'flex' : 'none';
            arrow.textContent   = open ? '▴' : '▾';
        }
    </script>
</body>
</html>
