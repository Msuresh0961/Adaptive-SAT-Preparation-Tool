<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="home-card">
            <div class="brand">
                <span class="brand-dot"></span>
                <span class="brand-name">Gnosis</span>
            </div>
            <h1 class="home-title">Welcome back.</h1>
            <p class="home-sub">Sign in to track your scores and stats.</p>

            <!-- Error message if login fails -->
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="post" class="name-form">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username"
                           required autocomplete="username" autofocus />
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password"
                           required autocomplete="current-password" />
                </div>
                <button type="submit" class="btn-primary">Sign In &rarr;</button>
            </form>

            <div class="home-links">
                <span style="font-size:0.875rem; color:var(--text-muted);">No account?</span>
                <a href="{{ url_for('register') }}" class="home-link">Create one</a>
                <a href="{{ url_for('leaderboard') }}" class="home-link">🏆 Leaderboard</a>
            </div>
        </div>
    </div>
</body>
</html>
